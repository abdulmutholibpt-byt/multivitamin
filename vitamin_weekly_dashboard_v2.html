    { name:"Vitamin B6", type:"Larut air", dose:"1.3–1.7 mg/hari", icon:"🌾", benefits:[{icon:"⚡",label:"Metabolisme",desc:"Membantu mengolah protein, lemak & karbohidrat"},{icon:"🧠",label:"Neurotransmitter",desc:"Mendukung produksi serotonin & dopamin"},{icon:"🛡",label:"Imunitas",desc:"Mendukung respons imun yang sehat"}], sources:["Pisang","Kentang","Biji-bijian","Ayam","Ikan tuna"], tip:"Pisang adalah sumber B6 praktis yang bisa dikonsumsi kapan saja sebagai camilan sehat." }

  { id:4, label:"Jum", full:"Jumat", theme:"Kulit, Rambut & Kecantikan", vitamins:[
    { name:"Biotin (B7)", type:"Larut air", dose:"30 mcg/hari", icon:"🥚", benefits:[{icon:"💇",label:"Rambut kuat",desc:"Mencegah kerontokan & memperkuat folikel rambut"},{icon:"💅",label:"Kuku sehat",desc:"Memperkuat kuku yang rapuh"},{icon:"🧴",label:"Kulit bercahaya",desc:"Menjaga elastisitas dan kelembapan kulit"}], sources:["Telur (kuning)","Kacang tanah","Salmon","Ubi jalar","Kacang almond"], tip:"Biotin sering disebut 'vitamin kecantikan'. Konsumsi telur rebus setiap pagi untuk manfaat optimal." },

    { name:"Zinc", type:"Mineral esensial", dose:"8–11 mg/hari", icon:"🦪", benefits:[{icon:"🛡",label:"Imunitas",desc:"Memperkuat respons imun tubuh"},{icon:"🩹",label:"Penyembuhan",desc:"Mempercepat penyembuhan luka dan regenerasi sel"},{icon:"👁",label:"Indera",desc:"Mendukung indera perasa dan penciuman"}], sources:["Tiram","Daging merah","Biji labu","Kacang mede","Tempe"], tip:"Zinc dan Vitamin C bekerja bersama memperkuat sistem imun. Kombinasi ideal saat tubuh terasa lelah." }

];

let activeDay = 0, selectedVit = 0;
const done = new Set();

function renderDayNav() {
  document.getElementById('dayNav').innerHTML = days.map(d =>
    `<button class="day-btn ${d.id===activeDay?'active':''}" onclick="setDay(${d.id})">${d.full}</button>`
  ).join('');
}

function getBarData(day) {
  const cats = {};
  day.vitamins.forEach(v => v.benefits.forEach(b => { cats[b.label]=(cats[b.label]||0)+1; }));
  const total = Object.values(cats).reduce((a,b)=>a+b,0);
  return Object.entries(cats).map(([label,n])=>({label,pct:Math.round(n/total*100)})).sort((a,b)=>b.pct-a.pct).slice(0,5);
}

function renderMain() {
  const day = days[activeDay];
  const vit = day.vitamins[selectedVit];
  document.getElementById('mainContent').innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">
      <div>
        <span class="day-badge"><i class="ti ti-calendar" aria-hidden="true" style="font-size:12px;margin-right:4px"></i>${day.full}</span>
        <div class="section-title">Fokus: ${day.theme}</div>
        <div class="section-sub">Pilih vitamin di bawah untuk melihat detail manfaat</div>
      </div>
      <button onclick="toggleDone(${activeDay})" style="padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid ${done.has(activeDay)?'#1D9E75':'#ccc'};background:${done.has(activeDay)?'#E1F5EE':'#f8f8f8'};color:${done.has(activeDay)?'#085041':'#5F5E5A'};font-size:13px;cursor:pointer;">
        <i class="ti ${done.has(activeDay)?'ti-check':'ti-circle'}" aria-hidden="true" style="margin-right:4px"></i>${done.has(activeDay)?'Sudah diminum ✓':'Tandai sudah diminum'}
      </button>
    </div>
    <div class="vitamins-grid">
      ${day.vitamins.map((v,i)=>`
        <div class="vitamin-card ${i===selectedVit?'selected':''}" onclick="selectVit(${i})">
          <div class="vit-icon">${v.icon}</div>
          <div class="vit-name">${v.name}</div>
          <div class="vit-type">${v.type}</div>
          <div class="vit-dose"><i class="ti ti-pill" aria-hidden="true" style="font-size:12px;margin-right:3px"></i>${v.dose}</div>
        </div>
      `).join('')}
    </div>
    <div class="detail-panel">
      <div class="detail-header">
        <div class="detail-icon">${vit.icon}</div>
        <div>
          <div class="detail-vname">${vit.name}</div>
          <div class="detail-cat">${vit.type} • ${vit.dose}</div>
        </div>
      </div>
      <div class="benefits-grid">
        ${vit.benefits.map(b=>`
          <div class="benefit-item">
            <span class="benefit-icon">${b.icon}</span>
            <div class="benefit-label">${b.label}</div>
            <div class="benefit-desc">${b.desc}</div>
          </div>
        `).join('')}
      </div>
      <div class="sources-section" style="margin-top:14px">
        <div class="sources-label"><i class="ti ti-salad" aria-hidden="true" style="font-size:12px;margin-right:4px"></i>Sumber alami</div>
        <div class="sources-list">${vit.sources.map(s=>`<span class="source-tag">${s}</span>`).join('')}</div>
      </div>
      <div class="tip-box"><strong><i class="ti ti-bulb" aria-hidden="true" style="font-size:13px;margin-right:4px;color:#1D9E75"></i>Tips:</strong> ${vit.tip}</div>
    </div>
    <div class="weekly-progress">
      <div class="prog-title"><i class="ti ti-progress" aria-hidden="true" style="font-size:14px;margin-right:4px"></i>Progress minggu ini (${done.size}/7 hari)</div>
      <div class="prog-days">
        ${days.map(d=>`<div class="prog-dot ${done.has(d.id)?'done':d.id===activeDay?'today':''}" onclick="setDay(${d.id})" title="${d.full}">${d.label}</div>`).join('')}
      </div>
    </div>
    <div class="chart-bar-wrap">
      <div style="font-size:13px;color:#5F5E5A;margin-bottom:10px;font-weight:500"><i class="ti ti-chart-bar" aria-hidden="true" style="font-size:14px;margin-right:4px"></i>Kategori manfaat vitamin hari ini</div>
      ${getBarData(day).map(b=>`
        <div class="chart-row">
          <div class="chart-label">${b.label}</div>
          <div class="chart-track"><div class="chart-fill" style="width:${b.pct}%"></div></div>
          <div class="chart-pct">${b.pct}%</div>
        </div>
      `).join('')}
    </div>
  `;
}

function setDay(id) { activeDay=id; selectedVit=0; renderDayNav(); renderMain(); }
function selectVit(i) { selectedVit=i; renderMain(); }
function toggleDone(id) { done.has(id)?done.delete(id):done.add(id); renderMain(); }

renderDayNav(); renderMain();
</script>
